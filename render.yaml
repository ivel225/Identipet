services:
  - type: web
    name: identipet-api
    runtime: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: IDENTIPET_JWT_SECRET
        generateValue: true
      - key: IDENTIPET_JWT_ISSUER
        value: identipet-api
      - key: IDENTIPET_JWT_EXPIRY_MINUTES
        value: 120
      - key: DATABASE_URL
        sync: false
      - key: USE_DATABASE_URL
        value: true
      - key: USE_POSTGRES
        value: false
      - key: IDENTIPET_MANAGE_SCHEMA
        value: true
      - key: DATABASE_SSL_REQUIRE
        value: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: WHITENOISE_ENABLED
        value: true
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: true
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: true
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: true
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: 31536000
