<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}IDentiPet API{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ecfeff;
      --ink: #0f172a;
      --muted: #475569;
      --primary: #0891b2;
      --accent: #059669;
      --panel: #ffffff;
      --soft: #e8f1f6;
      --border: #a5f3fc;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background:
        linear-gradient(135deg, rgba(236, 254, 255, 0.96), rgba(248, 250, 252, 0.98)),
        var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a { color: inherit; }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--primary);
      color: white;
      font-weight: 900;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav a,
    .button {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(8, 145, 178, 0.2);
      border-radius: 999px;
      padding: 0 14px;
      background: white;
      color: #164e63;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .nav a:hover,
    .button:hover {
      border-color: rgba(8, 145, 178, 0.42);
      box-shadow: 0 10px 24px rgba(8, 145, 178, 0.14);
      transform: translateY(-1px);
    }

    .hero {
      display: grid;
      gap: 20px;
      margin-bottom: 24px;
      padding: 30px;
      border: 1px solid rgba(8, 145, 178, 0.22);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0;
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .lead {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .card,
    .panel {
      border: 1px solid rgba(8, 145, 178, 0.16);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    .card { padding: 18px; }

    .label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .value {
      margin: 0;
      color: var(--ink);
      font-size: 22px;
      font-weight: 800;
      text-transform: capitalize;
    }

    .panel {
      margin-top: 16px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(8, 145, 178, 0.12);
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .panel-body { padding: 18px 20px 20px; }

    .resource-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .resource-list a {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      align-items: center;
      border: 1px solid rgba(8, 145, 178, 0.14);
      border-radius: 14px;
      padding: 0 14px;
      text-decoration: none;
      font-weight: 750;
    }

    .resource-list span {
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 13px 14px;
      border-bottom: 1px solid rgba(8, 145, 178, 0.12);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #164e63;
      background: #f0fdff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    code,
    pre {
      border-radius: 12px;
      background: #0f172a;
      color: #ecfeff;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    code { padding: 3px 6px; }

    pre {
      margin: 0;
      overflow-x: auto;
      padding: 16px;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      min-height: 26px;
      align-items: center;
      border-radius: 999px;
      padding: 0 9px;
      background: #dcfce7;
      color: #065f46;
      font-size: 12px;
      font-weight: 800;
    }

    .methods {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .method {
      border-radius: 7px;
      background: var(--soft);
      color: #164e63;
      padding: 4px 7px;
      font-size: 12px;
      font-weight: 800;
    }

    :focus-visible {
      outline: 4px solid rgba(8, 145, 178, 0.36);
      outline-offset: 2px;
    }

    @media (max-width: 760px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .hero { padding: 22px; }
      .grid,
      .resource-list { grid-template-columns: 1fr; }
      table { min-width: 760px; }
      .table-wrap { overflow-x: auto; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; }
      .nav a:hover,
      .button:hover { transform: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="mark">ID</span>
        <span>IDentiPet API</span>
      </a>
      <nav class="nav" aria-label="Backend navigation">
        <a href="/">Home</a>
        <a href="/api/">API</a>
        <a href="/api/docs/">Docs</a>
        <a href="/api/health/">Health</a>
      </nav>
    </header>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
